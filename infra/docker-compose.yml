services:
  personaplex:
    build:
      context: ..
      dockerfile: infra/Dockerfile.personaplex
    ports:
      - "8000:8000"
    environment:
      - HF_HUB_ENABLE_HF_TRANSFER=1
    volumes:
      - ../models/personaplex:/root/.cache/huggingface:rw
      - ../infra/ssl:/app/ssl:ro
    command: ["--host", "0.0.0.0", "--port", "8000", "--device", "cpu", "--ssl", "/app/ssl"]

  vc-api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    ports:
      - "5001:5001"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ../models/seed-vc:/app/models/seed-vc:ro
      - ../models/hf-cache:/app/checkpoints/hf_cache:rw
      - ../infra/ssl:/app/ssl:ro
    environment:
      - HF_HUB_CACHE=/app/checkpoints/hf_cache
      - VC_CHECKPOINT_PATH=/app/models/seed-vc/DiT_uvit_tat_xlsr_ema.pth
      - VC_MODEL_CONFIG=configs/presets/config_dit_mel_seed_uvit_xlsr_tiny.yml
    command: ["python", "-m", "uvicorn", "src.app:create_app", "--factory", "--host", "0.0.0.0", "--port", "5001", "--ssl-keyfile=/app/ssl/key.pem", "--ssl-certfile=/app/ssl/cert.pem"]

  meanvc-api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.meanvc
    ports:
      - "5002:5002"
    volumes:
      - ../models/meanvc-sv:/app/meanvc-src/runtime/speaker_verification/ckpt:ro
      - ../infra/ssl:/app/ssl:ro
    environment:
      - MEANVC_CKPT_DIR=/app/meanvc-src/ckpt
      - MEANVC_SV_CKPT=/app/meanvc-src/runtime/speaker_verification/ckpt/wavlm_large_finetune.pth
      - SSL_DIR=/app/ssl