services:
  personaplex:
    build:
      context: ..
      dockerfile: infra/Dockerfile.personaplex
    ports:
      - "8000:8000"
    environment:
      - HF_HUB_ENABLE_HF_TRANSFER=1
    env_file:
      - ../.env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ../models/personaplex:/home/appuser/.cache/huggingface:rw

  vc-api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    ports:
      - "5001:5001"
    volumes:
      - ../models/seed-vc:/app/models/seed-vc:ro
      - ../models/hf-cache:/app/checkpoints/hf_cache:rw
    environment:
      - HF_HUB_CACHE=/app/checkpoints/hf_cache
      - VC_CHECKPOINT_PATH=/app/models/seed-vc/DiT_uvit_tat_xlsr_ema.pth
      - VC_MODEL_CONFIG=configs/presets/config_dit_mel_seed_uvit_xlsr_tiny.yml
