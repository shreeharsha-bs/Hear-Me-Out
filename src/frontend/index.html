<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="icon" href="data:,">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hear Me Out</title>
    <link
      href="https://fonts.googleapis.com/css?family=Inter:300,400,600"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Opus recorder -->
    <script src="https://cdn.jsdelivr.net/npm/opus-recorder@latest/dist/recorder.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/opus-recorder@latest/dist/encoderWorker.min.js"></script>

    <!-- Opus decoder -->
    <script src="https://cdn.jsdelivr.net/npm/ogg-opus-decoder/dist/ogg-opus-decoder.min.js"></script>
      
    <!-- PersonaPlex WebSocket URL override: set via query param or default to ws://hostname:8000/api/chat -->
    <script>
      const params = new URLSearchParams(window.location.search);
      window.__PERSONAPLEX_WS_URL__ = params.get('personaplex_ws') || params.get('moshi_ws') || null;
      window.__VOICE_PROMPT__ = params.get('voice_prompt') || null;
      window.__TEXT_PROMPT__ = params.get('text_prompt') || null;
      window.__SEED__ = params.get('seed') || null;
    </script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ground: "#0C0F0B",
              primary: "#9AEE86",
              "accent-pink": "#FC9CC6",
              "accent-blue": "#B8E4FF",
            },
          },
        },
      };
    </script>
  </head>

  <body class="bg-zinc-700">
    <noscript>You must have JavaScript enabled to use this app.</noscript>
    <script data-type="module" type="text/babel" src="/app.jsx"></script>
    <div id="react"></div>
  </body>
</html>
